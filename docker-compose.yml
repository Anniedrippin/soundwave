version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: soundwave
      POSTGRES_USER: soundwave_user
      POSTGRES_PASSWORD: soundwave_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./fastapi_app:/app/fastapi_app

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./django_app:/app/django_app
    command: >
      sh -c "python django_app/manage.py migrate &&
             python django_app/manage.py runserver 0.0.0.0:8001"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data: