databases:
  - name: soundwave-db
    databaseName: soundwave
    user: soundwave_user
    plan: free

services:
  # ── FastAPI ────────────────────────────────────────────────────────────────
  - type: web
    name: soundwave-fastapi
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fastapi_app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soundwave-db
          property: connectionString
      - key: JAMENDO_CLIENT_ID
        value: fedb555f
      - key: JAMENDO_CLIENT_SECRET
        value: d4307b3a8b137a284f17b2be698fb95b
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: FRONTEND_URL
        value: https://soundwave-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Django (Admin panel) ───────────────────────────────────────────────────
  - type: web
    name: soundwave-django
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd django_app && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: cd django_app && gunicorn soundwave.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DATABASE_URL
        fromDatabase:
          name: soundwave-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: soundwave-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://soundwave-fastapi.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
